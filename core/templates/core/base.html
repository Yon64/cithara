<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cithara - AI Song Studio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
    <div class="app-container">
        <header>
            <nav>
                <div class="logo">
                    <span class="logo-icon">🎵</span>
                    <h1>Cithara</h1>
                </div>
                <div class="nav-links">
                    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Create</a>
                    <a href="/library/" class="{% if request.path == '/library/' %}active{% endif %}">Library</a>
                </div>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2026 Cithara AI. Powered by Suno API.</p>
        </footer>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
